<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">DataHub target data lifecycle architecture</title>
  <desc id="desc">Mock architecture diagram for DataHub showing source-native raw releases, schema drift checks, one working DuckDB with source-normalized and analysis-ready zones, analyzed artifacts, serving DuckDB, and HBP data releases.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#be123c"/>
    </marker>
    <marker id="arrowMuted" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#fb7185"/>
    </marker>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerRose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#be123c"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <style>
      .page { fill: #fff7f8; }
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 38px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 18px; fill: #475569; }
      .stageTitle { font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: #be123c; }
      .card { fill: #ffffff; stroke: #fecdd3; stroke-width: 2; filter: url(#cardShadow); }
      .softCard { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; filter: url(#cardShadow); }
      .innerCard { fill: #ffffff; stroke: #fecdd3; stroke-width: 1.6; }
      .header { fill: url(#headerRose); }
      .headerText { font-family: Helvetica, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #ffffff; }
      .body { font-family: Helvetica, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .bodyStrong { font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #881337; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 13px; fill: #1f2937; }
      .mutedMono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 12.5px; fill: #64748b; }
      .note { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #475569; }
      .flow { fill: none; stroke: #be123c; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .flowMuted { fill: none; stroke: #fb7185; stroke-width: 2.25; stroke-dasharray: 7 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowMuted); }
      .releaseBand { fill: #ffe4e6; stroke: #fb7185; stroke-width: 1.5; }
      .releaseText { font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #9f1239; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1120"/>

  <text class="title" x="70" y="76">DataHub Data Lifecycle Target Architecture</text>
  <text class="subtitle" x="70" y="112">Raw releases stay source-native and versioned; one working DuckDB keeps source-normalized and analysis-ready zones; HBP releases are published in batches.</text>

  <rect class="releaseBand" x="70" y="150" width="1660" height="42" rx="21"/>
  <text class="releaseText" x="96" y="176">Batch/release boundary: accumulate source updates, detect schema drift, then publish a versioned HBP data release instead of changing backend logic for every small dataset.</text>

  <text class="stageTitle" x="70" y="248">1. Source-Native Raw Releases</text>
  <text class="stageTitle" x="420" y="248">2. Drift Guard</text>
  <text class="stageTitle" x="730" y="248">3. DataHub Working DuckDB</text>
  <text class="stageTitle" x="1430" y="248">4. Artifacts + Serving</text>

  <g id="raw-release-layer">
    <rect class="card" x="70" y="278" width="300" height="520" rx="18"/>
    <rect class="header" x="70" y="278" width="300" height="54" rx="18"/>
    <path d="M70 312 H370 V332 H70 Z" fill="url(#headerRose)"/>
    <text class="headerText" x="96" y="313">raw source releases</text>

    <text class="bodyStrong" x="96" y="372">preserve source shape</text>
    <text class="mono" x="96" y="408">raw_gwas__mvp__2026_04</text>
    <text class="mono" x="96" y="434">raw_gwas__legacy_cvd__v1</text>
    <text class="mono" x="96" y="460">raw_clinvar__2026_04</text>
    <text class="mono" x="96" y="486">raw_dbsnp__build_155</text>

    <text class="bodyStrong" x="96" y="536">metadata registry</text>
    <text class="mutedMono" x="96" y="572">raw_release_registry</text>
    <text class="mutedMono" x="96" y="598">raw_file_inventory</text>
    <text class="mutedMono" x="96" y="624">columns_json</text>
    <text class="mutedMono" x="96" y="650">schema_fingerprint</text>
    <text class="mutedMono" x="96" y="676">checksum + source_uri</text>

    <rect class="releaseBand" x="96" y="718" width="248" height="44" rx="16"/>
    <text class="releaseText" x="116" y="746">raw is archived, not interpreted</text>
  </g>

  <g id="schema-drift-layer">
    <rect class="softCard" x="420" y="330" width="260" height="320" rx="18"/>
    <text class="bodyStrong" x="446" y="370">detect before analysis</text>
    <text class="mono" x="446" y="410">expected_columns</text>
    <text class="mono" x="446" y="436">detected_columns</text>
    <text class="mono" x="446" y="462">required_fields</text>
    <text class="mono" x="446" y="488">type/format checks</text>
    <text class="mono" x="446" y="514">rename candidates</text>
    <text class="mono" x="446" y="540">compatibility verdict</text>
    <text class="note" x="446" y="588">Fail early when a source release</text>
    <text class="note" x="446" y="610">breaks an analysis contract.</text>
  </g>

  <g id="working-duckdb-layer">
    <rect class="card" x="730" y="278" width="640" height="520" rx="18"/>
    <rect class="header" x="730" y="278" width="640" height="54" rx="18"/>
    <path d="M730 312 H1370 V332 H730 Z" fill="url(#headerRose)"/>
    <text class="headerText" x="756" y="313">datahub_working.duckdb</text>

    <rect class="innerCard" x="762" y="364" width="270" height="300" rx="16"/>
    <text class="bodyStrong" x="786" y="400">source_normalized zone</text>
    <text class="note" x="786" y="424">stable HBP input structure</text>
    <text class="mono" x="786" y="464">source_normalized_association</text>
    <text class="mono" x="786" y="490">source_normalized_expression</text>
    <text class="mono" x="786" y="516">source_normalized_clinvar</text>
    <text class="mono" x="786" y="542">source_normalized_sv</text>
    <text class="mutedMono" x="786" y="588">source_id, release_id</text>
    <text class="mutedMono" x="786" y="614">source_row_id, source_file</text>
    <text class="mutedMono" x="786" y="640">raw_payload_json, metadata_json</text>

    <rect class="innerCard" x="1068" y="364" width="270" height="300" rx="16"/>
    <text class="bodyStrong" x="1092" y="400">analysis_ready zone</text>
    <text class="note" x="1092" y="424">HBP scientific evidence model</text>
    <text class="mono" x="1092" y="464">analysis_ready_association</text>
    <text class="mono" x="1092" y="490">analysis_ready_expression</text>
    <text class="mono" x="1092" y="516">analysis_ready_annotations</text>
    <text class="mutedMono" x="1092" y="562">phenotype paths</text>
    <text class="mutedMono" x="1092" y="588">normalized identities</text>
    <text class="mutedMono" x="1092" y="614">axis/ancestry normalization</text>
    <text class="mutedMono" x="1092" y="640">source priority + dedupe keys</text>

    <path class="flow" d="M1032 514 H1068"/>

    <rect class="releaseBand" x="790" y="706" width="520" height="44" rx="16"/>
    <text class="releaseText" x="842" y="734">one physical working DB; separate logical stages for audit and debugging</text>
  </g>

  <g id="serving-layer">
    <rect class="card" x="1430" y="278" width="300" height="520" rx="18"/>
    <rect class="header" x="1430" y="278" width="300" height="54" rx="18"/>
    <path d="M1430 312 H1730 V332 H1430 Z" fill="url(#headerRose)"/>
    <text class="headerText" x="1456" y="313">release artifacts</text>

    <text class="bodyStrong" x="1456" y="372">published outputs</text>
    <text class="mono" x="1456" y="408">association/*.json.gz</text>
    <text class="mono" x="1456" y="434">overall/*.json.gz</text>
    <text class="mono" x="1456" y="460">secondary/sga/*.json.gz</text>
    <text class="mono" x="1456" y="486">secondary/expression/*.json.gz</text>

    <text class="bodyStrong" x="1456" y="536">serving DuckDB</text>
    <text class="mutedMono" x="1456" y="572">association_gene_payloads</text>
    <text class="mutedMono" x="1456" y="598">overall_gene_payloads</text>
    <text class="mutedMono" x="1456" y="624">gene_catalog</text>
    <text class="mutedMono" x="1456" y="650">expression_gene_payloads</text>
    <text class="mutedMono" x="1456" y="676">sga_gene_payloads</text>

    <rect class="releaseBand" x="1456" y="718" width="232" height="44" rx="16"/>
    <text class="releaseText" x="1490" y="746">versioned HBP release</text>
  </g>

  <path class="flow" d="M370 538 H420"/>
  <path class="flow" d="M680 490 H730"/>
  <path class="flow" d="M1370 538 H1430"/>

  <path class="flowMuted" d="M260 798 V858 H897 V798"/>
  <text class="note" x="440" y="842">source-normalized rows can be regenerated from raw releases when contracts change</text>

  <path class="flowMuted" d="M1204 798 V858 H1580 V798"/>
  <text class="note" x="1300" y="842">release artifacts can be rebuilt from analysis-ready tables</text>

  <g id="source-normalized-explanation">
    <rect class="softCard" x="70" y="910" width="780" height="146" rx="18"/>
    <text class="bodyStrong" x="96" y="948">source_normalized_* tables</text>
    <text class="body" x="96" y="978">Raw source rows translated into stable HBP columns while keeping source and release provenance.</text>
    <text class="mutedMono" x="96" y="1012">keeps source row IDs, release IDs, raw_payload_json, source-specific metadata</text>
    <text class="mutedMono" x="96" y="1038">avoids cross-source arbitration, dedupe, and final phenotype/ontology semantics</text>
  </g>

  <g id="analysis-ready-explanation">
    <rect class="softCard" x="950" y="910" width="780" height="146" rx="18"/>
    <text class="bodyStrong" x="976" y="948">analysis_ready_* tables</text>
    <text class="body" x="976" y="978">Enriched scientific evidence model used by HBP analysis, publication, and secondary analyses.</text>
    <text class="mutedMono" x="976" y="1012">normalizes identities, phenotype hierarchy, axes, ancestry, and provenance</text>
    <text class="mutedMono" x="976" y="1038">feeds source priority, variant-centric counting, publication, and serving artifacts</text>
  </g>
</svg>
