<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">DataHub target data lifecycle architecture</title>
  <desc id="desc">Mock architecture diagram for DataHub showing source-native raw releases, schema drift checks, prepared modality tables, canonical analysis tables, analyzed artifacts, serving DuckDB, and HBP data releases.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#be123c"/>
    </marker>
    <marker id="arrowMuted" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#fb7185"/>
    </marker>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerRose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#be123c"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <style>
      .page { fill: #fff7f8; }
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 38px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 18px; fill: #475569; }
      .stageTitle { font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; fill: #be123c; }
      .card { fill: #ffffff; stroke: #fecdd3; stroke-width: 2; filter: url(#cardShadow); }
      .softCard { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; filter: url(#cardShadow); }
      .header { fill: url(#headerRose); }
      .headerText { font-family: Helvetica, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #ffffff; }
      .body { font-family: Helvetica, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .bodyStrong { font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #881337; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 13px; fill: #1f2937; }
      .mutedMono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 12.5px; fill: #64748b; }
      .note { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #475569; }
      .flow { fill: none; stroke: #be123c; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .flowMuted { fill: none; stroke: #fb7185; stroke-width: 2.25; stroke-dasharray: 7 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowMuted); }
      .releaseBand { fill: #ffe4e6; stroke: #fb7185; stroke-width: 1.5; }
      .releaseText { font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #9f1239; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1120"/>

  <text class="title" x="70" y="76">DataHub Data Lifecycle Target Architecture</text>
  <text class="subtitle" x="70" y="112">Source-native raw releases stay versioned; prepared tables standardize modality inputs; canonical tables define HBP analysis semantics; serving artifacts remain release-oriented.</text>

  <rect class="releaseBand" x="70" y="150" width="1660" height="42" rx="21"/>
  <text class="releaseText" x="96" y="176">Batch/release boundary: accumulate source updates, validate schema drift, then publish a versioned HBP data release rather than changing backend logic for every small dataset.</text>

  <text class="stageTitle" x="70" y="248">1. Source-Native Raw Releases</text>
  <text class="stageTitle" x="424" y="248">2. Schema Drift Guard</text>
  <text class="stageTitle" x="744" y="248">3. Prepared Modality DB</text>
  <text class="stageTitle" x="1108" y="248">4. Canonical Analysis DB</text>
  <text class="stageTitle" x="1470" y="248">5. Artifacts + Serving</text>

  <g id="raw-release-layer">
    <rect class="card" x="70" y="278" width="300" height="520" rx="18"/>
    <rect class="header" x="70" y="278" width="300" height="54" rx="18"/>
    <path d="M70 312 H370 V332 H70 Z" fill="url(#headerRose)"/>
    <text class="headerText" x="96" y="313">raw source releases</text>

    <text class="bodyStrong" x="96" y="372">preserve source shape</text>
    <text class="mono" x="96" y="408">raw_gwas__mvp__2026_04</text>
    <text class="mono" x="96" y="434">raw_gwas__legacy_cvd__v1</text>
    <text class="mono" x="96" y="460">raw_clinvar__2026_04</text>
    <text class="mono" x="96" y="486">raw_dbsnp__build_155</text>

    <text class="bodyStrong" x="96" y="536">metadata registry</text>
    <text class="mutedMono" x="96" y="572">raw_release_registry</text>
    <text class="mutedMono" x="96" y="598">raw_file_inventory</text>
    <text class="mutedMono" x="96" y="624">columns_json</text>
    <text class="mutedMono" x="96" y="650">schema_fingerprint</text>
    <text class="mutedMono" x="96" y="676">checksum + source_uri</text>

    <rect class="releaseBand" x="96" y="718" width="248" height="44" rx="16"/>
    <text class="releaseText" x="116" y="746">raw is archived, not interpreted</text>
  </g>

  <g id="schema-drift-layer">
    <rect class="softCard" x="424" y="330" width="260" height="320" rx="18"/>
    <text class="bodyStrong" x="450" y="370">detect before analysis</text>
    <text class="mono" x="450" y="410">expected_columns</text>
    <text class="mono" x="450" y="436">detected_columns</text>
    <text class="mono" x="450" y="462">required_fields</text>
    <text class="mono" x="450" y="488">type/format checks</text>
    <text class="mono" x="450" y="514">rename candidates</text>
    <text class="mono" x="450" y="540">compatibility verdict</text>
    <text class="note" x="450" y="588">Fail early when a source release</text>
    <text class="note" x="450" y="610">breaks an analysis contract.</text>
  </g>

  <g id="prepared-layer">
    <rect class="card" x="744" y="278" width="310" height="520" rx="18"/>
    <rect class="header" x="744" y="278" width="310" height="54" rx="18"/>
    <path d="M744 312 H1054 V332 H744 Z" fill="url(#headerRose)"/>
    <text class="headerText" x="770" y="313">prepared modality tables</text>

    <text class="bodyStrong" x="770" y="372">stable HBP input columns</text>
    <text class="mono" x="770" y="408">prepared_association_rows</text>
    <text class="mono" x="770" y="434">prepared_expression_rows</text>
    <text class="mono" x="770" y="460">prepared_variant_annotation_rows</text>
    <text class="mono" x="770" y="486">prepared_structural_variant_rows</text>

    <text class="bodyStrong" x="770" y="536">still source-row close</text>
    <text class="mutedMono" x="770" y="572">source_id, release_id</text>
    <text class="mutedMono" x="770" y="598">source_row_id, source_file</text>
    <text class="mutedMono" x="770" y="624">raw_payload_json</text>
    <text class="mutedMono" x="770" y="650">metadata_json</text>

    <rect class="releaseBand" x="770" y="718" width="248" height="44" rx="16"/>
    <text class="releaseText" x="792" y="746">standardized, not arbitrated</text>
  </g>

  <g id="canonical-layer">
    <rect class="card" x="1108" y="278" width="310" height="520" rx="18"/>
    <rect class="header" x="1108" y="278" width="310" height="54" rx="18"/>
    <path d="M1108 312 H1418 V332 H1108 Z" fill="url(#headerRose)"/>
    <text class="headerText" x="1134" y="313">canonical analysis tables</text>

    <text class="bodyStrong" x="1134" y="372">HBP scientific semantics</text>
    <text class="mono" x="1134" y="408">canonical_association_points</text>
    <text class="mono" x="1134" y="434">canonical_expression_points</text>
    <text class="mono" x="1134" y="460">canonical_variant_annotations</text>

    <text class="bodyStrong" x="1134" y="536">analysis-ready fields</text>
    <text class="mutedMono" x="1134" y="572">normalized gene/variant IDs</text>
    <text class="mutedMono" x="1134" y="598">phenotype paths</text>
    <text class="mutedMono" x="1134" y="624">axis normalization</text>
    <text class="mutedMono" x="1134" y="650">source priority inputs</text>
    <text class="mutedMono" x="1134" y="676">dedupe/counting keys</text>

    <rect class="releaseBand" x="1134" y="718" width="248" height="44" rx="16"/>
    <text class="releaseText" x="1164" y="746">where science becomes strict</text>
  </g>

  <g id="serving-layer">
    <rect class="card" x="1470" y="278" width="260" height="520" rx="18"/>
    <rect class="header" x="1470" y="278" width="260" height="54" rx="18"/>
    <path d="M1470 312 H1730 V332 H1470 Z" fill="url(#headerRose)"/>
    <text class="headerText" x="1496" y="313">release artifacts</text>

    <text class="bodyStrong" x="1496" y="372">published outputs</text>
    <text class="mono" x="1496" y="408">association/*.json.gz</text>
    <text class="mono" x="1496" y="434">overall/*.json.gz</text>
    <text class="mono" x="1496" y="460">secondary/sga/*.json.gz</text>
    <text class="mono" x="1496" y="486">secondary/expression/*.json.gz</text>

    <text class="bodyStrong" x="1496" y="536">serving DB</text>
    <text class="mutedMono" x="1496" y="572">association_gene_payloads</text>
    <text class="mutedMono" x="1496" y="598">overall_gene_payloads</text>
    <text class="mutedMono" x="1496" y="624">gene_catalog</text>
    <text class="mutedMono" x="1496" y="650">expression_gene_payloads</text>
    <text class="mutedMono" x="1496" y="676">sga_gene_payloads</text>

    <rect class="releaseBand" x="1496" y="718" width="206" height="44" rx="16"/>
    <text class="releaseText" x="1526" y="746">HBP data release</text>
  </g>

  <path class="flow" d="M370 538 H424"/>
  <path class="flow" d="M684 490 H744"/>
  <path class="flow" d="M1054 538 H1108"/>
  <path class="flow" d="M1418 538 H1470"/>

  <path class="flowMuted" d="M260 798 V858 H899 V798"/>
  <text class="note" x="444" y="842">prepared rows can be regenerated from raw releases when contracts change</text>

  <path class="flowMuted" d="M1263 798 V858 H1600 V798"/>
  <text class="note" x="1328" y="842">artifacts can be rebuilt from canonical tables per release</text>

  <g id="prepared-vs-canonical">
    <rect class="softCard" x="70" y="910" width="780" height="146" rx="18"/>
    <text class="bodyStrong" x="96" y="948">Prepared table layer</text>
    <text class="body" x="96" y="978">Source-adjacent, modality-standardized rows. It answers: “How do we express this source in a stable HBP input schema?”</text>
    <text class="mutedMono" x="96" y="1012">keeps source row IDs, release IDs, raw_payload_json, source-specific metadata</text>
    <text class="mutedMono" x="96" y="1038">avoids cross-source arbitration, dedupe, and final phenotype semantics</text>
  </g>

  <g id="canonical-meaning">
    <rect class="softCard" x="950" y="910" width="780" height="146" rx="18"/>
    <text class="bodyStrong" x="976" y="948">Canonical ingest / analysis layer</text>
    <text class="body" x="976" y="978">Analysis-ready records. It answers: “How should HBP reason scientifically about this evidence across sources?”</text>
    <text class="mutedMono" x="976" y="1012">normalizes identities, phenotype hierarchy, axes, ancestry, and provenance</text>
    <text class="mutedMono" x="976" y="1038">feeds source priority, variant-centric counting, publication, and secondary analyses</text>
  </g>
</svg>
