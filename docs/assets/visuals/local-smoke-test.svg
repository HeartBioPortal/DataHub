<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">Local Smoke Test</title>
  <desc id="desc">A quick confidence path for configs, CLIs, docs, and unit tests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.52" stop-color="#f4f8fa"/>
      <stop offset="1" stop-color="#eef4f5"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f8a5b"/>
      <stop offset="0.5" stop-color="#3b6ea8"/>
      <stop offset="1" stop-color="#d1893f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#16212b" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#dfe8ec" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" fill="none" stroke="#dbe5e9" stroke-width="2"/>
  <rect x="690" y="32" width="462" height="296" rx="24" fill="#ffffff" opacity="0.82" filter="url(#shadow)"/>
  <rect x="706" y="50" width="430" height="260" rx="18" fill="url(#grid)" opacity="0.7"/>
  <path d="M86 263 C197 211 251 273 362 222 C434 189 499 192 586 225" fill="none" stroke="url(#ribbon)" stroke-width="12" stroke-linecap="round" opacity="0.72"/>
  <circle cx="112" cy="246" r="10" fill="#4f8a5b"/>
  <circle cx="337" cy="228" r="10" fill="#3b6ea8"/>
  <circle cx="569" cy="220" r="10" fill="#d1893f"/>
  <rect x="70" y="58" width="146" height="34" rx="17" fill="#243240"/>
  <text x="92" y="81" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Runbook</text>
  <text x="70" y="139" fill="#1f2c37" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="800">Local Smoke Test</text>
  <text x="72" y="174" fill="#4e6272" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">A quick confidence path for configs, CLIs, docs, and unit tests.</text>
  <text x="72" y="304" fill="#536a79" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="700">Before you push</text>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="800">
    <rect x="746" y="112" width="348" height="46" rx="10" fill="#4f8a5b" opacity="0.96"/>
    <text x="770" y="141" fill="#ffffff">Install</text>
    <path d="M920 164 L920 181" stroke="#7a8c98" stroke-width="3" stroke-linecap="round"/>
    <path d="M920 181 L912 173 M920 181 L928 173" stroke="#7a8c98" stroke-width="3" stroke-linecap="round"/>
    <rect x="746" y="188" width="348" height="46" rx="10" fill="#3b6ea8" opacity="0.96"/>
    <text x="770" y="217" fill="#ffffff">Validate</text>
    <path d="M920 240 L920 257" stroke="#7a8c98" stroke-width="3" stroke-linecap="round"/>
    <path d="M920 257 L912 249 M920 257 L928 249" stroke="#7a8c98" stroke-width="3" stroke-linecap="round"/>
    <rect x="746" y="264" width="348" height="46" rx="10" fill="#d1893f" opacity="0.98"/>
    <text x="770" y="293" fill="#ffffff">Verify</text>
  </g>
  <g fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.84">
    <path d="M740 74 L792 60 L846 78 L902 54 L958 72 L1018 54 L1088 76" stroke="#3b6ea8"/>
    <path d="M740 92 L792 82 L846 98 L902 76 L958 94 L1018 76 L1088 96" stroke="#4f8a5b"/>
  </g>
  <g opacity="0.9">
    <circle cx="792" cy="60" r="5" fill="#3b6ea8"/>
    <circle cx="902" cy="54" r="5" fill="#3b6ea8"/>
    <circle cx="1018" cy="54" r="5" fill="#3b6ea8"/>
    <circle cx="792" cy="82" r="5" fill="#4f8a5b"/>
    <circle cx="902" cy="76" r="5" fill="#4f8a5b"/>
    <circle cx="1018" cy="76" r="5" fill="#4f8a5b"/>
  </g>
  <rect x="728" y="52" width="122" height="30" rx="15" fill="#243240" opacity="0.9"/>
  <text x="747" y="72" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="800">DATAHUB</text>
</svg>
